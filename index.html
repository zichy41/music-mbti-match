<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>声命镜像 Pro - 寻找你的古典灵魂</title>
    
    <link rel="stylesheet" href="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    <script src="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/Chart.js/3.7.1/chart.min.js"></script>

    <style>
        :root {
            --primary: #6c5ce7;
            --primary-grad: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --bg: #f8f9fc;
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
            --agree: #34c759;
            --disagree: #ff3b30;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased; display: flex; justify-content: center; color: var(--text-main);
        }

        #app { width: 100%; max-width: 414px; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.05); }
        .screen { padding: 40px 25px; flex: 1; display: flex; flex-direction: column; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        /* --- 首页视觉 --- */
        .welcome-icon { font-size: 5rem; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 10px 15px rgba(108,92,231,0.25)); animation: floating 3s infinite ease-in-out; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* --- 选择页视觉 --- */
        .progress-bar { width: 100%; height: 6px; background: #f2f2f7; border-radius: 10px; margin-bottom: 35px; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--primary-grad); width: 0%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .choice-labels { display: flex; justify-content: space-between; font-weight: 800; font-size: 1rem; margin-top: 40px; }
        .scale-box { display: flex; justify-content: space-between; align-items: center; margin: 35px 0; }
        .circle { border: 3px solid; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .c-g { border-color: var(--agree); } .c-p { border-color: var(--disagree); }
        .s3 { width: 52px; height: 52px; } .s2 { width: 42px; height: 42px; } .s1 { width: 34px; height: 34px; } .s0 { width: 26px; height: 26px; border-color: #d1d1d6; }

        /* --- 结果页极致美化 --- */
        .res-header { text-align: center; margin-bottom: 25px; }
        .mbti-pill { display: inline-block; padding: 5px 15px; background: #f2f2f7; border-radius: 20px; font-weight: 800; font-size: 0.8rem; letter-spacing: 2px; color: var(--primary); margin-bottom: 10px; }
        .res-header h1 { font-family: 'Noto Serif SC', serif; font-size: 2.8rem; margin: 5px 0; font-weight: 900; }
        
        .chart-container { background: #fff; border-radius: 30px; padding: 20px; margin-bottom: 25px; border: 1px solid #f0f0f5; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        
        .analysis-box { background: #fff; border-radius: 25px; padding: 25px; border-left: 6px solid var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.03); margin-bottom: 25px; }
        .analysis-box h3 { margin: 0 0 12px 0; font-size: 1.1rem; display: flex; align-items: center; }
        .analysis-box h3 i { margin-right: 8px; color: var(--primary); }
        .analysis-box p { line-height: 1.8; color: #3a3a3c; font-size: 1rem; margin: 0; }

        .trait-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 35px; }
        .trait-card { background: #f8f9fb; padding: 18px 10px; border-radius: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; border: 1px solid #f0f0f5; }
        .trait-card i { font-size: 1.5rem; color: var(--primary); margin-bottom: 10px; }
        .trait-card span { font-size: 0.9rem; font-weight: 700; color: #1c1c1e; }

        .btn-main { background: #1c1c1e; color: white; border: none; padding: 22px; border-radius: 20px; font-weight: 800; width: 100%; font-size: 1.1rem; cursor: pointer; }
        .restart-text { text-align: center; margin-top: 30px; color: var(--text-sub); font-size: 0.9rem; text-decoration: underline; text-underline-offset: 5px; cursor: pointer; line-height: 1.6; }
    </style>
</head>
<body>

<div id="app">
    <section id="landing" class="screen">
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <i class="fa-solid fa-compact-disc welcome-icon"></i>
            <h1 style="font-size:3rem; font-weight:900; margin:20px 0 10px 0;">声命镜像</h1>
            <p style="text-align:center; color:var(--text-sub); line-height:1.6; padding:0 20px;">通过 20 道灵魂调律题<br>寻找与你契合的古典音乐巨匠</p>
        </div>
        <button class="btn-main" onclick="start()">开启灵魂调律 <i class="fa-solid fa-chevron-right"></i></button>
    </section>

    <section id="quiz" class="screen hidden">
        <div class="progress-bar"><div class="progress-inner" id="p-bar"></div></div>
        <div style="height:140px;">
            <div style="font-weight:800; color:#d1d1d6; margin-bottom:10px;">QUESTION <span id="q-num">1</span></div>
            <h2 id="q-text" style="font-size:1.6rem; line-height:1.4; margin:0;">...</h2>
        </div>
        <div class="choice-labels">
            <span style="color:var(--agree)">同意</span>
            <span style="color:var(--disagree)">反对</span>
        </div>
        <div class="scale-box">
            <div class="circle c-g s3" onclick="next(3)"></div>
            <div class="circle c-g s2" onclick="next(2)"></div>
            <div class="circle c-g s1" onclick="next(1)"></div>
            <div class="circle s0" onclick="next(0)"></div>
            <div class="circle c-p s1" onclick="next(-1)"></div>
            <div class="circle c-p s2" onclick="next(-2)"></div>
            <div class="circle c-p s3" onclick="next(-3)"></div>
        </div>
    </section>

    <section id="result" class="screen hidden">
        <div class="res-header">
            <div class="mbti-pill" id="res-mbti"></div>
            <h1 id="res-name"></h1>
            <div style="height:2px; width:40px; background:var(--primary); margin:15px auto;"></div>
        </div>

        <div class="chart-container">
            <canvas id="radarChart"></canvas>
        </div>

        <div class="analysis-box">
            <h3><i class="fa-solid fa-wand-sparkles"></i> 灵魂特质</h3>
            <p id="res-desc"></p>
        </div>

        <div class="trait-grid" id="res-traits">
            </div>

        <div class="restart-text" onclick="location.reload()">
            乐章并未终结<br>点击此处重新开启另一场灵魂共鸣
        </div>
    </section>
</div>

<script>
    // 确保每个人格都有 4 个图标特质
    const db = {
        "INTJ": { 
            name: "贝多芬", 
            desc: "你是一位拥有宏大叙事能力的构建者。在你的内心深处，逻辑与激情并不是冲突的。你倾向于在严谨的结构中爆发惊人的意志力，将挑战锻造成不朽的凯旋。", 
            traits: [
                {icon: "fa-brain", text: "宏大秩序"}, {icon: "fa-fire-alt", text: "意志爆发"},
                {icon: "fa-shield-halved", text: "精神独立"}, {icon: "fa-chess-king", text: "深谋远虑"}
            ],
            stats: [85, 95, 100, 95, 95, 98] 
        },
        "INFP": { 
            name: "肖邦", 
            desc: "你是灵魂的低语者。相比于外界的喧嚣，你更依赖于捕捉内心最细微的情绪起伏。你的情感是内敛且极致纤细的，擅长在极简的表达中承载极深的情感。", 
            traits: [
                {icon: "fa-feather", text: "极致纤细"}, {icon: "fa-moon", text: "孤独美学"},
                {icon: "fa-heart", text: "情感诗人"}, {icon: "fa-wand-magic-sparkles", text: "浪漫幻想"}
            ],
            stats: [98, 30, 80, 90, 85, 95] 
        },
        "ISTJ": { 
            name: "巴赫", 
            desc: "你是宇宙秩序的守望者。你擅长像建筑师一样搭建逻辑的复调，让感性与理性在最严密的数字美感中交汇。你是那种能从繁杂中梳理出永恒路径的稳健力量。", 
            traits: [
                {icon: "fa-monument", text: "逻辑复调"}, {icon: "fa-scale-balanced", text: "极度克制"},
                {icon: "fa-infinity", text: "神圣恒久"}, {icon: "fa-pen-ruler", text: "结构大师"}
            ],
            stats: [20, 100, 100, 98, 90, 40] 
        },
        "ESTP": { 
            name: "莫扎特", 
            desc: "你是上帝的宠儿，天生的直觉大师。规则对你而言从不是束缚。你拥有举重若轻的能力，能在复杂的博弈中保持一种透明感，总能在不经意间触碰到艺术的核心。", 
            traits: [
                {icon: "fa-bolt", text: "灵感直觉"}, {icon: "fa-face-laugh-beam", text: "灵动自由"},
                {icon: "fa-star", text: "天生焦点"}, {icon: "fa-wind", text: "举重若轻"}
            ],
            stats: [80, 45, 98, 98, 88, 100] 
        }
    };

    const questions = [
        { q: "面对复杂任务时，你倾向于先建立清晰的逻辑框架，而非直接投入情感。", type: "T" },
        { q: "在社交场合，你通常是那个主动发起话题、通过交流获得能量的人。", type: "E" },
        { q: "你更习惯为每天的计划设定明确的进度，并倾向于按部就班地完成。", type: "J" },
        { q: "你经常被抽象的、甚至有些古怪的理念吸引，而非具体的现实细节。", type: "N" },
        { q: "比起未来的各种可能性，你更倾向于关注此时此刻看得见、摸得着的现实。", type: "S" },
        { q: "你更喜欢独自钻研或进行深度的私密对谈，大型聚会往往让你感到疲惫。", type: "I" },
        { q: "处理争议时，你会优先考虑事实的逻辑准确性，即便可能会让人感到冷淡。", type: "T" },
        { q: "你享受随性而发的即兴感，认为‘计划赶不上变化’是一种常态。", type: "P" },
        { q: "你认为经典和传统是极其宝贵的，创新应建立在对传统的尊重之上。", type: "S" },
        { q: "你非常在意他人的感受，愿意为了维护和谐而调整自己的计划。", type: "F" },
        { q: "你喜欢在最后期限的压力下寻找爆发感，这能激发你的创意。", type: "P" },
        { q: "你受客观真理的驱动程度，远高于受个人情感或价值观的驱动程度。", type: "T" },
        { q: "在创作或工作时，安静独立的空间对你来说是绝对必要的。", type: "I" },
        { q: "你经常被描述为一个‘脑洞很大’的人，喜欢探索跨界和超前的理论。", type: "N" },
        { q: "你认为生活应该是有条理、可预测的，秩序感能带给你最大的安全感。", type: "J" },
        { q: "你会因为艺术作品中纯粹的情感张力而触动，而非仅仅关注技术难度。", type: "F" },
        { q: "你享受成为焦点的瞬间，观众的瞩目会让你感到充满力量。", type: "E" },
        { q: "你倾向于通过亲手实践来解决问题，而非长时间停留在理论分析阶段。", type: "S" },
        { q: "为了达到某种完美的境界，你愿意推翻大部分工作重新开始。", type: "P" },
        { q: "你认为在人际关系中，情感的真挚沟通比‘谁是对的’重要得多。", type: "F" }
    ];

    let step = 0;
    let sc = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    function start() {
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        update();
    }

    function update() {
        document.getElementById('q-num').innerText = step + 1;
        document.getElementById('q-text').innerText = questions[step].q;
        document.getElementById('p-bar').style.width = `${((step+1)/questions.length)*100}%`;
    }

    function next(v) {
        const q = questions[step];
        const opp = {E:'I', I:'E', S:'N', N:'S', T:'F', F:'T', J:'P', P:'J'};
        if(v > 0) sc[q.type] += v;
        else if(v < 0) sc[opp[q.type]] += Math.abs(v);
        step++;
        if(step < questions.length) update();
        else show();
    }

    function show() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        const m = (sc.E>=sc.I?'E':'I')+(sc.S>=sc.N?'S':'N')+(sc.T>=sc.F?'T':'F')+(sc.J>=sc.P?'J':'P');
        
        // 兜底逻辑：如果没有匹配到，默认显示贝多芬
        const p = db[m] || db["INTJ"];
        
        document.getElementById('res-mbti').innerText = m;
        document.getElementById('res-name').innerText = p.name;
        document.getElementById('res-desc').innerText = p.desc;
        
        // 渲染图标特质（增加兜底 Emoji）
        document.getElementById('res-traits').innerHTML = p.traits.map(t => `
            <div class="trait-card">
                <i class="fa-solid ${t.icon}"></i>
                <span>${t.text}</span>
            </div>
        `).join('');

        // 渲染图表
        setTimeout(() => {
            const ctx = document.getElementById('radarChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['感性', '理性', '创造', '逻辑', '影响', '稳定'],
                    datasets: [{ 
                        data: p.stats, 
                        backgroundColor: 'rgba(108, 92, 231, 0.15)', 
                        borderColor: '#6c5ce7', 
                        borderWidth: 2.5, 
                        pointRadius: 4,
                        pointBackgroundColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: { 
                    scales: { 
                        r: { 
                            min: 0, max: 100, 
                            ticks: { display: false }, 
                            grid: { color: '#f0f0f5' },
                            pointLabels: { font: { size: 12, weight: 'bold' } }
                        } 
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }, 100);
    }
</script>
</body>
</html>
