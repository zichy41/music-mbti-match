<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>声命镜像 Pro</title>
    
    <script src="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/Chart.js/3.7.1/chart.min.js"></script>

    <style>
        :root {
            --primary: #6c5ce7;
            --primary-grad: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --bg: #f2f2f7;
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); 
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; justify-content: center; min-height: 100vh;
        }

        #app { 
            width: 100%; max-width: 414px; background: white; min-height: 100vh; 
            position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }

        .screen { padding: 40px 25px; flex: 1; display: flex; flex-direction: column; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }

        /* SVG 图标通用样式 */
        .svg-icon { width: 64px; height: 64px; fill: var(--primary); margin-bottom: 20px; }
        .trait-icon { width: 24px; height: 24px; fill: var(--primary); margin-bottom: 8px; }

        /* 进度条 */
        .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 10px; margin-bottom: 30px; }
        .progress-inner { height: 100%; background: var(--primary-grad); width: 0%; transition: 0.3s; }

        /* 选项按钮 */
        .scale-box { display: flex; justify-content: space-between; align-items: center; margin: 40px 0; }
        .circle { border: 3px solid; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .s3 { width: 50px; height: 50px; } .s2 { width: 40px; height: 40px; } .s1 { width: 32px; height: 32px; }
        .c-g { border-color: #34c759; } .c-p { border-color: #ff3b30; }

        /* 结果卡片 */
        .res-card { background: #fff; border-radius: 25px; padding: 25px; border-left: 6px solid var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .trait-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .trait-item { background: #f8f9fb; padding: 15px; border-radius: 15px; text-align: center; display: flex; flex-direction: column; align-items: center; }

        .btn-main { background: #1c1c1e; color: white; border: none; padding: 20px; border-radius: 18px; font-weight: 800; width: 100%; font-size: 1.1rem; }
        .restart { text-align: center; color: var(--text-sub); margin-top: 30px; font-size: 0.9rem; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <section id="landing" class="screen">
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
            <h1 style="font-size:2.8rem; margin:0;">声命镜像</h1>
            <p style="color:var(--text-sub); text-align:center; line-height:1.6;">探索你性格深处的古典旋律</p>
        </div>
        <button class="btn-main" onclick="start()">开始调律</button>
    </section>

    <section id="quiz" class="screen hidden">
        <div class="progress-bar"><div class="progress-inner" id="p-bar"></div></div>
        <h2 id="q-text" style="height:120px; font-size:1.5rem; margin-top:20px;">正在加载...</h2>
        <div class="scale-box">
            <div class="circle c-g s3" onclick="next(3)"></div>
            <div class="circle c-g s2" onclick="next(2)"></div>
            <div class="circle c-g s1" onclick="next(1)"></div>
            <div class="circle c-p s1" onclick="next(-1)"></div>
            <div class="circle c-p s2" onclick="next(-2)"></div>
            <div class="circle c-p s3" onclick="next(-3)"></div>
        </div>
        <div style="display:flex; justify-content:space-between; font-weight:bold;">
            <span style="color:#34c759;">非常同意</span>
            <span style="color:#ff3b30;">非常反对</span>
        </div>
    </section>

    <section id="result" class="screen hidden">
        <div style="text-align:center; margin-bottom:20px;">
            <span id="res-mbti" style="color:var(--primary); font-weight:800; letter-spacing:2px;"></span>
            <h1 id="res-name" style="font-size:2.5rem; margin:5px 0;"></h1>
        </div>
        <canvas id="radarChart" style="max-height:250px; margin-bottom:20px;"></canvas>
        <div class="res-card">
            <p id="res-desc" style="line-height:1.7; margin:0;"></p>
        </div>
        <div class="trait-grid" id="res-traits"></div>
        <div class="restart" onclick="location.reload()">乐章并未终结，点击此处重新开启另一场灵魂共鸣</div>
    </section>
</div>

<script>
    const db = {
        "INTJ": { name: "贝多芬", desc: "你是天生的构建者，擅长在无序中建立宏伟秩序。你拥有极强的意志力，能将生命中的苦难转化为不朽的旋律。", traits: ["意志爆发", "独立深邃", "逻辑缜密", "远见卓识"], stats: [80, 95, 100, 90, 85, 95] },
        "INFP": { name: "肖邦", desc: "你是灵魂的诗人。你对世界有敏锐的感知，擅长捕捉内心最细微的情绪起伏，在孤独中绽放极具美感的灵魂之火。", traits: ["极致纤细", "浪漫幻想", "孤独美学", "真挚共鸣"], stats: [98, 30, 85, 90, 80, 90] },
        "INFJ": { name: "拉威尔", desc: "你是完美的工匠。你将炽热情感浓缩在最严苛的框架下，每一丝情绪都经过精确计算，追求极境的美感。", traits: ["完美主义", "内敛克制", "细腻排版", "精神向导"], stats: [90, 85, 90, 95, 88, 92] },
        "ISTJ": { name: "巴赫", desc: "你是秩序的守望者。你在复杂的复调逻辑中触碰永恒。规则对你而言不是束缚，而是通往神圣自由的唯一路径。", traits: ["规律严谨", "逻辑巅峰", "专注可靠", "永恒秩序"], stats: [30, 100, 95, 98, 90, 50] },
        "ENFP": { name: "舒曼", desc: "你是永恒的追梦人。你的世界充满幻想与炽热情感，你是跨越现实与理想边境的探险家。", traits: ["狂热激情", "跳跃创意", "博学多才", "理想主义"], stats: [95, 40, 90, 85, 95, 98] },
        "ENTP": { name: "普罗科菲耶夫", desc: "你是机敏的博弈者。你乐于挑战常规，用出其不意的逻辑给世界带来惊喜，从不被教条束缚。", traits: ["犀利幽默", "挑战传统", "灵活多变", "智力驱动"], stats: [75, 85, 95, 88, 92, 100] },
        "ENFJ": { name: "柴可夫斯基", desc: "你是情感的共振者。你的真挚让每一个音符都能直接击中他人最柔软的内心，温暖且富有力量。", traits: ["极致热忱", "同理心强", "极具魅力", "情感领袖"], stats: [95, 50, 80, 90, 95, 92] },
        "ENTJ": { name: "李斯特", desc: "你是时代的引领者。你不仅拥有卓越的技巧，更有掌控全局的魅力与远见，天生属于舞台的中心。", traits: ["领袖气质", "技巧巅峰", "掌控全局", "极具开创"], stats: [88, 90, 92, 95, 98, 95] },
        "INTP": { name: "勋伯格", desc: "你是理性的探险家。你敢于拆解传承百年的规则，构建属于未来的逻辑体系，你是思想的先驱。", traits: ["拆解重构", "绝对理性", "客观严苛", "突破边界"], stats: [40, 98, 88, 95, 90, 100] },
        "ISFJ": { name: "勃拉姆斯", desc: "你是传统的守望者。你在古典形式中包裹着最细腻的人文关怀，内敛、坚定且充满厚重感。", traits: ["稳重可靠", "内敛深情", "敬畏传统", "极致耐心"], stats: [85, 88, 70, 92, 85, 80] },
        "ISTP": { name: "维瓦尔第", desc: "你是自然的捕捉者。你拥有惊人的专注力和实践力，擅长捕捉瞬时的灵感并将其化作永恒的节奏。", traits: ["务实高效", "瞬间爆发", "技术宅力", "自然灵性"], stats: [70, 90, 85, 88, 90, 95] },
        "ISFP": { name: "舒伯特", desc: "你是纯粹的吟游诗人。你的灵感如同泉水自然涌现，不带匠气，唯有对生命最本真的歌颂。", traits: ["纯真本能", "艺术灵感", "活在当下", "不染尘埃"], stats: [92, 35, 80, 85, 82, 90] },
        "ESTJ": { name: "海顿", desc: "你是社会的定海神针。你懂得如何在结构与幽默之间寻找平衡，是值得所有人信赖的秩序组织者。", traits: ["秩序井然", "幽默稳重", "高效产出", "值得信赖"], stats: [60, 95, 75, 90, 95, 85] },
        "ESFJ": { name: "门德尔松", desc: "你是和谐的使者。你追求优雅与极致的平衡，擅长将复杂的社会关系处理得如同旋律般顺滑。", traits: ["优雅得体", "社交核心", "追求和谐", "温润如玉"], stats: [85, 80, 80, 85, 95, 88] },
        "ESTP": { name: "莫扎特", desc: "你是天生的宠儿。规则对你而言是玩具，你拥有举重若轻的直觉，在复杂的博弈中保持透明的天真。", traits: ["直觉惊人", "轻快灵动", "应变极强", "举重若轻"], stats: [80, 50, 98, 95, 90, 100] },
        "ESFP": { name: "格里格", desc: "你是生命的舞者。你热爱鲜活的色彩与民族的根脉，总能从日常烟火中提炼出跳动的生命力。", traits: ["感染力强", "色彩斑斓", "活泼灵动", "真挚热情"], stats: [90, 40, 85, 80, 95, 92] }
    };

    const questions = [
        { q: "面对复杂任务，你倾向于建立清晰的逻辑框架而非感性直觉。", type: "T" },
        { q: "在社交场合，你通常是主动发起话题、获得能量的人。", type: "E" },
        { q: "你习惯为每天的计划设定明确进度，并按部就班完成。", type: "J" },
        { q: "你经常被抽象、古怪的理念吸引，而非具体的现实细节。", type: "N" },
        { q: "比起未来的可能性，你更关注当下看得见摸得着的现实。", type: "S" },
        { q: "你更喜欢独自钻研或私密对谈，大型聚会让你感到疲惫。", type: "I" },
        { q: "处理争议时，你会优先考虑事实的逻辑准确性，即便显得冷淡。", type: "T" },
        { q: "你享受随性而发的即兴感，认为计划赶不上变化。", type: "P" },
        { q: "你认为传统是宝贵的，创新应建立在对传统的尊重之上。", type: "S" },
        { q: "你非常在意他人的感受，愿意为了和谐调整自己的计划。", type: "F" },
        { q: "你喜欢在最后期限的压力下工作，这能激发你的创意。", type: "P" },
        { q: "在创作或工作时，安静独立的空间对你是绝对必要的。", type: "I" },
        { q: "你经常被描述为一个脑洞很大的人，喜欢探索超前理论。", type: "N" },
        { q: "你认为生活应该是有条理的，秩序感带给你最大的安全感。", type: "J" },
        { q: "你会因为艺术作品中纯粹的情感张力而触动，而非技术难度。", type: "F" },
        { q: "你享受成为焦点的瞬间，观众的瞩目让你感到力量。", type: "E" },
        { q: "你倾向于通过亲手实践解决问题，而非长时间理论分析。", type: "S" },
        { q: "在人际关系中，情感的真挚沟通比‘谁是对的’更重要。", type: "F" },
        { q: "你对数字、逻辑和客观规律有一种天然的亲近感。", type: "T" },
        { q: "你喜欢挑战未知领域，哪怕意味着要打破已有规则。", type: "P" }
    ];

    let step = 0;
    let sc = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    function start() {
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        update();
    }

    function update() {
        document.getElementById('q-text').innerText = questions[step].q;
        document.getElementById('p-bar').style.width = `${((step+1)/questions.length)*100}%`;
    }

    function next(v) {
        const q = questions[step];
        const opp = {E:'I', I:'E', S:'N', N:'S', T:'F', F:'T', J:'P', P:'J'};
        if(v > 0) sc[q.type] += v;
        else if(v < 0) sc[opp[q.type]] += Math.abs(v);
        step++;
        if(step < questions.length) update();
        else show();
    }

    function show() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        const m = (sc.E>=sc.I?'E':'I')+(sc.S>=sc.N?'S':'N')+(sc.T>=sc.F?'T':'F')+(sc.J>=sc.P?'J':'P');
        const p = db[m] || db["INTJ"];
        
        document.getElementById('res-mbti').innerText = m;
        document.getElementById('res-name').innerText = p.name;
        document.getElementById('res-desc').innerText = p.desc;
        
        // 渲染 4 个特质小卡片
        document.getElementById('res-traits').innerHTML = p.traits.map(t => `
            <div class="trait-item">
                <div style="font-size:1.2rem; margin-bottom:5px;">✨</div>
                <span>${t}</span>
            </div>
        `).join('');

        // 绘图逻辑
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['感性', '理性', '创造', '逻辑', '影响', '稳定'],
                datasets: [{ 
                    data: p.stats, 
                    backgroundColor: 'rgba(108, 92, 231, 0.1)', borderColor: '#6c5ce7', borderWidth: 2 
                }]
            },
            options: { scales: { r: { min:0, max:100, ticks:{display:false} } }, plugins:{legend:{display:false}} }
        });
    }
</script>
</body>
</html>
