<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>声命镜像 Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <section id="landing" class="screen">
            <div class="hero-visual">
                <div class="v-circle v-1"></div>
                <div class="v-circle v-2"></div>
                <i class="fa-solid fa-music-note welcome-icon"></i>
            </div>
            <h1 class="main-title">声命镜像</h1>
            <div class="intro-card">
                <p>每个人的性格中都跳动着一段独特的旋律。基于 <b>MBTI 模型</b>，我们将深度解析你的灵魂构成。</p >
            </div>
            <button class="btn-main" onclick="start()">开启灵魂调律 <i class="fa-solid fa-arrow-right"></i></button>
        </section>

        <section id="quiz" class="screen hidden">
            <div class="progress-bar"><div class="progress-inner" id="p-bar"></div></div>
            <div class="step-label">STAGE <span id="q-num">1</span>/20</div>
            <h2 id="q-text">正在初始化...</h2>
            <div class="choice-labels">
                <span class="agree-label"><i class="fa-solid fa-check"></i> 同意</span>
                <span class="disagree-label">反对 <i class="fa-solid fa-xmark"></i></span>
            </div>
            <div class="scale-box">
                <div class="circle c-g s3" onclick="next(3)"></div>
                <div class="circle c-g s2" onclick="next(2)"></div>
                <div class="circle c-g s1" onclick="next(1)"></div>
                <div class="circle s0" onclick="next(0)"></div>
                <div class="circle c-p s1" onclick="next(-1)"></div>
                <div class="circle c-p s2" onclick="next(-2)"></div>
                <div class="circle c-p s3" onclick="next(-3)"></div>
            </div>
        </section>

        <section id="result" class="screen hidden">
            <div class="res-header">
                <div class="mbti-code" id="res-mbti"></div>
                <h1 id="res-name"></h1>
            </div>
            <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
            <div class="desc-box" id="res-desc"></div>
            <div id="res-facts"></div>
            <button class="btn-main" onclick="location.reload()" style="background:#f2f2f7; color:#8e8e93; margin-top:20px;">重新开启</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
