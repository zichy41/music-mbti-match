<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>声命镜像 - 寻找你的古典灵魂</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #6c5ce7;
            --primary-light: rgba(108, 92, 231, 0.1);
            --primary-grad: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --bg: #fcfcff;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --agree: #00b894;
            --disagree: #ff7675;
            --card-shadow: 0 20px 40px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); 
            
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex; justify-content: center; color: var(--text-main);
        }

        #app {
            width: 100%; max-width: 414px; background: white; min-height: 100vh;
            position: relative; display: flex; flex-direction: column;
            box-shadow: 0 0 60px rgba(0,0,0,0.03);
        }

        .screen { padding: 45px 30px; flex: 1; display: flex; flex-direction: column; transition: all 0.5s ease; }
        .hidden { display: none !important; opacity: 0; }

        
        .hero-visual { position: relative; height: 220px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .v-circle { position: absolute; border-radius: 50%; border: 1px solid rgba(108, 92, 231, 0.2); animation: pulse 4s infinite ease-in-out; }
        .v-1 { width: 180px; height: 180px; }
        .v-2 { width: 130px; height: 130px; animation-delay: 1s; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.1); opacity: 0.5; } }

        .welcome-icon { 
            font-size: 5rem; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 15px 25px rgba(108,92,231,0.25)); z-index: 2;
            animation: floating 3.5s infinite ease-in-out;
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .main-title { font-size: 3rem; font-weight: 900; text-align: center; margin: 15px 0; letter-spacing: -1.5px; color: #000; }
        .intro-card { background: #fbfbff; border: 1px solid #f0f0f5; border-radius: 28px; padding: 25px; margin-bottom: 35px; box-shadow: var(--card-shadow); }
        .intro-card p { font-size: 1rem; line-height: 1.8; color: #424245; margin: 0 0 12px 0; }

        /* --- 选择页：修正对齐逻辑 --- */
        .progress-bar { width: 100%; height: 5px; background: #f2f2f7; border-radius: 10px; margin-bottom: 35px; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--primary-grad); width: 0%; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .q-header { font-weight: 800; color: #d1d1d6; font-size: 0.85rem; letter-spacing: 1px; }
        #q-text { font-size: 1.6rem; margin-top: 25px; line-height: 1.4; font-weight: 700; height: 120px; }

        .choice-labels { 
            display: flex; justify-content: space-between; /* 强制两端分布 */
            font-weight: 700; font-size: 0.95rem; margin-top: 40px; padding: 0 5px; 
        }
        .agree-label { color: var(--agree); }
        .disagree-label { color: var(--disagree); }

        .scale-box { display: flex; justify-content: space-between; align-items: center; margin: 35px -5px; }
        .circle { border: 2.5px solid; border-radius: 50%; cursor: pointer; transition: 0.25s cubic-bezier(0.2, 0, 0, 1); }
        .circle:active { transform: scale(0.85); background: rgba(0,0,0,0.05); }
        .c-g { border-color: var(--agree); } .c-p { border-color: var(--disagree); }
        .s3 { width: 54px; height: 54px; } .s2 { width: 44px; height: 44px; } .s1 { width: 34px; height: 34px; } .s0 { width: 26px; height: 26px; border-color: #e5e5ea; }

        /* --- 结果页：高级排版与复原语录 --- */
        .res-header { text-align: center; margin-bottom: 25px; }
        .mbti-code { font-family: 'Playfair Display', serif; font-style: italic; color: var(--primary); font-size: 1.4rem; letter-spacing: 3px; }
        #res-name { font-size: 2.8rem; margin: 8px 0; font-weight: 900; letter-spacing: -1px; }
        
        .chart-wrap { background: #fff; border-radius: 32px; padding: 20px; margin-bottom: 25px; border: 1px solid #f0f0f5; box-shadow: var(--card-shadow); }
        
        .desc-box { 
            background: #fff; padding: 28px; border-radius: 28px; line-height: 1.9; color: #424245;
            border-left: 6px solid var(--primary); box-shadow: var(--card-shadow); margin-bottom: 30px; font-size: 1.05rem;
        }
        .fact-item { background: #f5f5f7; padding: 18px 22px; border-radius: 20px; margin: 12px 0; font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; }
        .fact-item::before { content: "✦"; color: var(--primary); margin-right: 12px; font-size: 1.1rem; }

        .btn-main { 
            background: #1d1d1f; color: white; border: none; padding: 22px; border-radius: 20px; 
            font-weight: 700; width: 100%; font-size: 1.15rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .btn-main:active { transform: scale(0.97); background: #000; }
        
        /* 重新匹配的话语 */
        .restart-text { 
            text-align: center; color: var(--text-sub); font-size: 0.9rem; margin-top: 30px; line-height: 1.6;
            padding: 0 20px; cursor: pointer; text-decoration: underline; text-underline-offset: 4px;
        }
    </style>
</head>
<body>

<div id="app">
    <section id="landing" class="screen">
        <div class="hero-visual">
            <div class="v-circle v-1"></div>
            <div class="v-circle v-2"></div>
            <i class="fa-solid fa-compact-disc welcome-icon"></i>
        </div>
        <div style="color: var(--primary); font-weight: 800; letter-spacing: 3px; text-align: center; font-size: 0.8rem; margin-bottom: 5px;">MUSICAL MIRROR PRO</div>
        <h1 class="main-title">声命镜像</h1>
        <div class="intro-card">
            <p>每个人的性格中都跳动着一段独特的旋律。基于 <b>MBTI 模型</b>，我们将深度解析你的灵魂构成。</p>
            <p><i class="fa-solid fa-wand-magic-sparkles"></i> 20 道灵魂调律题，寻找那位在精神世界与你最契合的<b>古典音乐巨匠</b>。</p>
        </div>
        <button class="btn-main" onclick="start()">开启灵魂调律 <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i></button>
    </section>

    <section id="quiz" class="screen hidden">
        <div class="progress-bar"><div class="progress-inner" id="p-bar"></div></div>
        <div class="q-header">STAGE <span id="q-num">1</span> / 20</div>
        <h2 id="q-text">正在校准调律逻辑...</h2>
        <div class="choice-labels">
            <span class="agree-label"><i class="fa-solid fa-circle-check"></i> 同意</span>
            <span class="disagree-label">反对 <i class="fa-solid fa-circle-xmark"></i></span>
        </div>
        <div class="scale-box">
            <div class="circle c-g s3" onclick="next(3)"></div>
            <div class="circle c-g s2" onclick="next(2)"></div>
            <div class="circle c-g s1" onclick="next(1)"></div>
            <div class="circle s0" onclick="next(0)"></div>
            <div class="circle c-p s1" onclick="next(-1)"></div>
            <div class="circle c-p s2" onclick="next(-2)"></div>
            <div class="circle c-p s3" onclick="next(-3)"></div>
        </div>
    </section>

    <section id="result" class="screen hidden">
        <div class="res-header">
            <div class="mbti-code" id="res-mbti"></div>
            <h1 id="res-name"></h1>
        </div>
        <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
        <div class="desc-box" id="res-desc"></div>
        <div id="res-facts"></div>
        
        <div class="restart-text" onclick="location.reload()">
            乐章并未终结，点击此处重新开启另一场灵魂共鸣
        </div>
    </section>
</div>

<script>
    // 完整的 MBTI 数据库与古典音乐家对应
    const db = {
        "INTJ": { name: "贝多芬", desc: "你是独立且深邃的思考者。你不迎合平庸，擅长在无序中建立宏伟的秩序，用坚韧的意志对抗命运。", facts: ["在黑暗中寻找光的逻辑","专注时世界为你静止","坚信意志可以重塑命运"], stats: [85, 95, 100, 95, 95, 98] },
        "INTP": { name: "勋伯格", desc: "你是理性的探险家。你敢于拆解传承百年的规则，构建属于未来的逻辑体系，即便那充满挑战。", facts: ["对逻辑自洽有苛刻要求","脑海中始终进行思维风暴","不在意大众的暂时误解"], stats: [40, 98, 85, 98, 100, 100] },
        "INFJ": { name: "拉威尔", desc: "你是完美的工匠。你将炽热的情感浓缩在严苛的框架下，含蓄而绚烂，每一处细节都经得起推敲。", facts: ["每一丝情绪都经过精确计算","社交外壳下是极致的细腻","追求极境的美感"], stats: [92, 88, 85, 98, 92, 90] },
        "INFP": { name: "肖邦", desc: "你是灵魂的诗人。你对世界有极敏锐的触觉，用最轻盈的音符承载最沉重的忧郁，在孤独中绽放。", facts: ["情感波动是创作源泉","在孤独中与自我深度对话","渴望理想化的共鸣"], stats: [98, 30, 80, 90, 85, 95] },
        "ENTJ": { name: "李斯特", desc: "你是时代的引领者。你不仅拥有卓越的技巧，更有掌控全局的魅力与远见，天生属于舞台的中心。", facts: ["舞台是你的天然领地","渴望突破生理与规则极限","极具开创精神"], stats: [85, 88, 90, 98, 95, 95] },
        "ENTP": { name: "普罗科菲耶夫", desc: "你是机敏的博弈者。你乐于挑战常规，用出其不意的逻辑给世界带来惊喜，从不被教条束缚。", facts: ["拒绝平庸的抒情方式","热衷于智力挑战","音乐中带有犀利的幽默感"], stats: [70, 88, 98, 85, 92, 98] },
        "ENFJ": { name: "柴可夫斯基", desc: "你是情感的共振者。你的真挚让每一个音符都能直接击中听众最柔软的内心，温暖且富有力量。", facts: ["渴望被理解与接纳","情感起伏即是生命律动","旋律极具歌唱性"], stats: [95, 45, 75, 95, 90, 95] },
        "ENFP": { name: "舒曼", desc: "你是永恒的追梦人。你的世界充满了文学色彩与奇幻想象，情感炽热到可以超越理性的边际。", facts: ["文学与音乐的跨界大师","灵魂中寄宿着多重人格","对理想有着狂热追求"], stats: [98, 40, 95, 90, 85, 98] },
        "ISTJ": { name: "巴赫", desc: "你是宇宙秩序的翻译者。你在最严密的复调逻辑中，触碰到了神圣的永恒，严谨中蕴含伟大。", facts: ["规则即是通往自由的路径","无与伦比的勤奋与严谨","建筑学般完美的逻辑感"], stats: [20, 100, 100, 98, 90, 40] },
        "ISFJ": { name: "勃拉姆斯", desc: "你是传统的深情守望者。你在古典形式中，包裹着最细腻且厚重的人文关怀，内敛而坚定。", facts: ["不动声色的情感坚持","对传承有着天然敬畏心","内敛中蕴含巨大爆发力"], stats: [82, 85, 60, 90, 95, 90] },
        "ESTJ": { name: "海顿", desc: "你是秩序的建立者。你懂得如何在结构与幽默之间寻找平衡，是值得所有人信赖的定海神针。", facts: ["极高的产出效率与稳定性","懂得在规则内寻找乐趣","值得信赖的社交核心"], stats: [50, 95, 60, 95, 92, 85] },
        "ESFJ": { name: "门德尔松", desc: "你是文明的传播者。你追求和谐与极致的平衡，将优雅化作了艺术准则，极具亲和力。", facts: ["厌恶极端的冲突与无序","擅长维护人际和谐","创作逻辑清晰明快"], stats: [70, 75, 75, 92, 95, 88] },
        "ISTP": { name: "维瓦尔第", desc: "你是自然的捕捉者。你拥有惊人的专注力，擅长复刻大地的律动，将瞬时的灵感化作永恒。", facts: ["节奏感是思考的轴心","极其务实的创作态度","瞬间捕捉色彩的高手"], stats: [65, 85, 75, 90, 95, 90] },
        "ISFP": { name: "舒伯特", desc: "你是大自然的歌手。你的创作如同泉水涌出，不带一丝匠气，唯有最纯粹的情感流淌。", facts: ["倾向于小众表达","对自然有着原始向往","旋律感是你的本能"], stats: [90, 40, 70, 85, 80, 95] },
        "ESTP": { name: "莫扎特", desc: "你是直觉的宠儿。你不需要费力思考，因为世界的逻辑本就存在于你的直觉中，举重若轻。", facts: ["讨厌被陈旧教条束缚","极强的即兴应变能力","举重若轻地平衡复杂性"], stats: [80, 45, 98, 98, 88, 100] },
        "ESFP": { name: "格里格", desc: "你是民族色彩的绘图员。你热爱生活，擅长将最鲜活的烟火化作跳跃的音符，活在当下。", facts: ["热爱具有生命力的传统","性格开朗且富有同情心","极强的视觉转化力"], stats: [85, 35, 80, 85, 88, 95] }
    };

    const questions = [
        { q: "面对复杂任务时，你倾向于先建立清晰的逻辑框架，而非直接投入情感。", type: "T" },
        { q: "在社交场合，你通常是那个主动发起话题、通过交流获得能量的人。", type: "E" },
        { q: "你更习惯为每天的计划设定明确的进度，并倾向于按部就班地完成。", type: "J" },
        { q: "你经常被抽象的、甚至有些古怪的理念吸引，而非具体的现实细节。", type: "N" },
        { q: "比起未来的各种可能性，你更倾向于关注此时此刻看得见、摸得着的现实。", type: "S" },
        { q: "你更喜欢独自钻研或进行深度的私密对谈，大型聚会往往让你感到疲惫。", type: "I" },
        { q: "处理争议时，你会优先考虑事实的逻辑准确性，即便可能会让人感到冷淡。", type: "T" },
        { q: "你享受随性而发的即兴感，认为‘计划赶不上变化’是一种常态。", type: "P" },
        { q: "你认为经典和传统是极其宝贵的，创新应建立在对传统的尊重之上。", type: "S" },
        { q: "你非常在意他人的感受，愿意为了维护和谐而调整自己的计划。", type: "F" },
        { q: "你喜欢在最后期限（DDL）的压力下寻找爆发感，这能激发你的创意。", type: "P" },
        { q: "你受客观真理的驱动程度，远高于受个人情感或价值观的驱动程度。", type: "T" },
        { q: "在创作或工作时，安静独立的空间对你来说是绝对必要的。", type: "I" },
        { q: "你经常被描述为一个‘脑洞很大’的人，喜欢探索跨界和超前的理论。", type: "N" },
        { q: "你认为生活应该是有条理、可预测的，秩序感能带给你最大的安全感。", type: "J" },
        { q: "你会因为艺术作品中纯粹的情感张力而触动，而非仅仅关注技术难度。", type: "F" },
        { q: "你享受成为焦点的瞬间，观众的瞩目会让你感到充满力量。", type: "E" },
        { q: "你倾向于通过亲手实践来解决问题，而非长时间停留在理论分析阶段。", type: "S" },
        { q: "为了达到某种完美的境界，你愿意推翻大部分工作重新开始。", type: "P" },
        { q: "你认为在人际关系中，情感的真挚沟通比‘谁是对的’重要得多。", type: "F" }
    ];

    let step = 0;
    let scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    function start() {
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        document.getElementById('q-num').innerText = step + 1;
        document.getElementById('q-text').innerText = questions[step].q;
        document.getElementById('p-bar').style.width = `${((step+1)/questions.length)*100}%`;
    }

    function next(value) {
        const type = questions[step].type;
        const opposites = {E:'I', I:'E', S:'N', N:'S', T:'F', F:'T', J:'P', P:'J'};
        
        if(value > 0) scores[type] += value;
        else if(value < 0) scores[opposites[type]] += Math.abs(value);
        
        step++;
        if(step < questions.length) {
            renderQuestion();
        } else {
            calculateResult();
        }
    }

    function calculateResult() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        const mbti = (scores.E >= scores.I ? 'E' : 'I') +
                     (scores.S >= scores.N ? 'S' : 'N') +
                     (scores.T >= scores.F ? 'T' : 'F') +
                     (scores.J >= scores.P ? 'J' : 'P');
        
        const person = db[mbti] || db["INTJ"];
        
        document.getElementById('res-mbti').innerText = mbti;
        document.getElementById('res-name').innerText = person.name;
        document.getElementById('res-desc').innerText = person.desc;
        document.getElementById('res-facts').innerHTML = person.facts.map(f => `<div class="fact-item">${f}</div>`).join('');

        // 渲染图表
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['天赋', '情感', '技法', '辨识', '影响', '创新'],
                datasets: [{ 
                    data: person.stats, 
                    backgroundColor: 'rgba(108, 92, 231, 0.15)', 
                    borderColor: '#6c5ce7', 
                    borderWidth: 3, 
                    pointRadius: 4,
                    pointBackgroundColor: '#6c5ce7'
                }]
            },
            options: { 
                scales: { 
                    r: { min: 0, max: 100, ticks: { display: false }, grid: { color: '#e5e5ea' } } 
                }, 
                plugins: { legend: { display: false } } 
            }
        });
    }
</script>
</body>
</html>
