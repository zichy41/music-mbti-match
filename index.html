<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>声命镜像 - 寻找你的古典灵魂</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #6c5ce7;
            --primary-grad: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --bg: #f8f9fc;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --agree: #00b894;
            --disagree: #ff7675;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased; display: flex; justify-content: center;
        }

        #app { width: 100%; max-width: 414px; background: white; min-height: 100vh; position: relative; }
        .screen { padding: 40px 25px; flex: 1; display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        /* --- 首页样式保持高级 --- */
        .hero-visual { position: relative; height: 180px; display: flex; justify-content: center; align-items: center; }
        .welcome-icon { font-size: 4.5rem; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 10px 20px rgba(108,92,231,0.2)); z-index: 2; animation: floating 3s infinite ease-in-out; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- 选择页样式 --- */
        .progress-bar { width: 100%; height: 4px; background: #eee; border-radius: 2px; margin-bottom: 30px; }
        .progress-inner { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        .choice-labels { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.9rem; margin-top: 40px; }
        .scale-box { display: flex; justify-content: space-between; align-items: center; margin: 30px 0; }
        .circle { border: 2.5px solid; border-radius: 50%; cursor: pointer; }
        .c-g { border-color: var(--agree); } .c-p { border-color: var(--disagree); }
        .s3 { width: 50px; height: 50px; } .s2 { width: 40px; height: 40px; } .s1 { width: 32px; height: 32px; } .s0 { width: 24px; height: 24px; border-color: #ddd; }

        /* --- 结果页：深度美化 --- */
        .res-top { text-align: center; margin-bottom: 25px; padding-top: 10px; }
        .mbti-tag { 
            display: inline-block; padding: 6px 16px; background: var(--primary-light); 
            color: var(--primary); border-radius: 50px; font-weight: 800; font-size: 0.85rem; 
            letter-spacing: 2px; margin-bottom: 10px; border: 1px solid rgba(108,92,231,0.2);
        }
        .res-top h1 { font-family: 'Noto Serif SC', serif; font-size: 3rem; margin: 5px 0; letter-spacing: -1px; }
        
        .chart-section { 
            background: linear-gradient(180deg, #fcfcff 0%, #ffffff 100%); 
            border-radius: 35px; padding: 25px 15px; margin-bottom: 30px;
            border: 1px solid #f0f0f5; box-shadow: 0 15px 35px rgba(0,0,0,0.03);
        }

        .analysis-card { 
            background: white; border-radius: 28px; padding: 30px; 
            margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            border: 1px solid #f6f6f9; position: relative; overflow: hidden;
        }
        .analysis-card::after { 
            content: "\f10d"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            position: absolute; top: 20px; right: 25px; font-size: 3rem; color: #f0f0f5; z-index: 0;
        }
        .analysis-content { position: relative; z-index: 1; }
        .analysis-content h3 { font-size: 1.2rem; margin: 0 0 15px 0; color: var(--primary); display: flex; align-items: center; }
        .analysis-content h3 i { margin-right: 10px; font-size: 1rem; }
        .analysis-content p { line-height: 1.9; font-size: 1rem; color: #424245; margin: 0; }

        .trait-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .trait-item { 
            background: #f8f9fc; padding: 15px; border-radius: 18px; 
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .trait-item i { font-size: 1.4rem; color: var(--primary); margin-bottom: 8px; }
        .trait-item span { font-size: 0.85rem; font-weight: 700; color: #1d1d1f; }

        .btn-main { 
            background: #1d1d1f; color: white; border: none; padding: 20px; border-radius: 20px; 
            font-weight: bold; width: 100%; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        .restart-link { 
            text-align: center; margin-top: 25px; color: var(--text-sub); font-size: 0.9rem;
            text-decoration: underline; text-underline-offset: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app">
    <section id="landing" class="screen">
        <div class="hero-visual">
            <i class="fa-solid fa-compact-disc welcome-icon"></i>
        </div>
        <h1 style="text-align:center; font-size:2.8rem; margin:10px 0;">声命镜像</h1>
        <div style="background:#f8f9fc; padding:25px; border-radius:25px; margin:20px 0 35px 0; line-height:1.7;">
            <p>每个人的性格中都跳动着一段独特的旋律。基于 MBTI 模型，我们将为你寻找那位在精神世界最契合的<b>古典音乐巨匠</b>。</p>
        </div>
        <button class="btn-main" onclick="start()">开启灵魂调律 <i class="fa-solid fa-arrow-right"></i></button>
    </section>

    <section id="quiz" class="screen hidden">
        <div class="progress-bar"><div class="progress-inner" id="p-bar"></div></div>
        <h2 id="q-text" style="font-size:1.6rem; height:120px; margin-top:20px;">...</h2>
        <div class="choice-labels">
            <span style="color:var(--agree)">同意</span>
            <span style="color:var(--disagree)">反对</span>
        </div>
        <div class="scale-box">
            <div class="circle c-g s3" onclick="next(3)"></div>
            <div class="circle c-g s2" onclick="next(2)"></div>
            <div class="circle c-g s1" onclick="next(1)"></div>
            <div class="circle s0" onclick="next(0)"></div>
            <div class="circle c-p s1" onclick="next(-1)"></div>
            <div class="circle c-p s2" onclick="next(-2)"></div>
            <div class="circle c-p s3" onclick="next(-3)"></div>
        </div>
    </section>

    <section id="result" class="screen hidden">
        <div class="res-top">
            <div class="mbti-tag" id="res-mbti"></div>
            <h1 id="res-name"></h1>
            <p style="color:var(--text-sub); font-weight:500;">你的艺术灵魂回响</p>
        </div>

        <div class="chart-section">
            <canvas id="radarChart"></canvas>
        </div>

        <div class="analysis-card">
            <div class="analysis-content">
                <h3><i class="fa-solid fa-quote-left"></i> 核心人格解析</h3>
                <p id="res-desc"></p>
            </div>
        </div>

        <div class="trait-grid" id="res-traits">
            </div>

        <div class="restart-link" onclick="location.reload()">
            乐章并未终结，点击此处重新开启另一场灵魂共鸣
        </div>
    </section>
</div>

<script>
    const db = {
        "INTJ": { 
            name: "贝多芬", 
            desc: "你是一位拥有宏大叙事能力的构建者。在你的内心深处，逻辑与激情并不是冲突的，而是秩序的两个维度。你不屑于平庸的装饰，更倾向于在严谨的结构中爆发惊人的意志力，将苦难锻造成不朽的凯旋。你是那种即使世界失声，也能在脑海中勾勒出完美宇宙律动的人。", 
            traits: [
                {icon: "fa-brain", text: "宏大秩序"},
                {icon: "fa-fire-alt", text: "意志爆发"},
                {icon: "fa-shield-halved", text: "精神独立"},
                {icon: "fa-chess-king", text: "深谋远虑"}
            ],
            stats: [85, 95, 100, 95, 95, 98] 
        },
        "INFP": { 
            name: "肖邦", 
            desc: "你是灵魂的低语者。相比于外界的喧嚣，你更依赖于捕捉内心最细微的情绪起伏。你的情感是内敛且极致纤细的，擅长在极简的表达中承载极重的情感。你像是一位在孤独中修剪繁花的诗人，不求所有人理解，只求那瞬间的完美共鸣。", 
            traits: [
                {icon: "fa-feather", text: "极致纤细"},
                {icon: "fa-moon", text: "孤独美学"},
                {icon: "fa-heart", text: "情感诗人"},
                {icon: "fa-wand-magic-sparkles", text: "浪漫幻想"}
            ],
            stats: [98, 30, 80, 90, 85, 95] 
        },
        "ISTJ": { 
            name: "巴赫", 
            desc: "你是宇宙秩序的守望者。在你的认知里，极致的自由存在于极致的规则之中。你擅长像建筑师一样搭建逻辑的复调，让感性与理性在最严密的数字美感中交汇。你是那种能从日常的繁杂中，梳理出通往永恒路径的稳健力量。", 
            traits: [
                {icon: "fa-monument", text: "逻辑复调"},
                {icon: "fa-scale-balanced", text: "极度克制"},
                {icon: "fa-infinity", text: "神圣恒久"},
                {icon: "fa-pen-ruler", text: "结构大师"}
            ],
            stats: [20, 100, 100, 98, 90, 40] 
        },
        "ESTP": { 
            name: "莫扎特", 
            desc: "你是上帝的宠儿，天生的直觉大师。规则对你而言从不是束缚，而是供你戏耍的玩具。你拥有举重若轻的能力，能在复杂的博弈中保持一种近乎天真的透明感。你的生命节奏是轻盈且富有感染力的，总能在不经意间触碰到艺术的核心。", 
            traits: [
                {icon: "fa-bolt", text: "灵感直觉"},
                {icon: "fa-face-laugh-beam", text: "灵动自由"},
                {icon: "fa-star", text: "天生焦点"},
                {icon: "fa-wind", text: "举重若轻"}
            ],
            stats: [80, 45, 98, 98, 88, 100] 
        }
        // ... 其他人格可按此结构补全，确保每个都有 traits 数组
    };

    // 补全其他逻辑，确保未定义的人格回退到贝多芬
    function getSafePerson(mbti) {
        return db[mbti] || db["INTJ"];
    }

    const questions = [
        { q: "比起热闹的聚会，你更享受在独处中通过思考或艺术获得精神上的补给。", type: "I" },
        { q: "在处理复杂问题时，你倾向于相信逻辑推演，而非临场的感觉或直觉。", type: "T" },
        { q: "你对未来的宏观规划比当下的琐碎细节更能让你感到兴奋。", type: "N" },
        { q: "你喜欢生活在有秩序、可预测的环境中，认为计划是效率的保障。", type: "J" },
        { q: "你经常被形容为一个感性的人，容易被电影、音乐中的微小细节触动。", type: "F" },
        { q: "在社交场合，你通常是那个调动气氛、主动连接不同人群的人。", type: "E" },
        { q: "你更愿意相信证据确凿的事实，而不是带有虚幻色彩的灵感。", type: "S" },
        { q: "你享受即兴而为的快乐，认为过多的条条框框会扼杀创造力。", type: "P" },
        { q: "处理争议时，你总是能保持客观，即便这可能被认为有点‘冷血’。", type: "T" },
        { q: "你拥有一种极强的预感，往往能提前察觉到事情未来的走向。", type: "N" },
        { q: "你是一个典型的行动派，认为‘坐而论道’不如‘起而行之’。", type: "S" },
        { q: "即使在最疲惫的时候，面对朋友的请求，你也很难说出‘拒绝’。", type: "F" },
        { q: "你的书桌或工作空间通常是整洁有序的，这有助于你保持思考。", type: "J" },
        { q: "你喜欢挑战未知的领域，哪怕那意味着要打破已经建立的规则。", type: "P" },
        { q: "在安静的环境中深度阅读或聆听音乐，是你最完美的下午茶。", type: "I" },
        { q: "你享受成为焦点的感觉，并愿意为此展示自己的才华与魅力。", type: "E" },
        { q: "你对数字、逻辑和客观规律有一种天然的亲近感。", type: "T" },
        { q: "在做决定时，你往往会先考虑：‘这是否符合我的内心价值观？’", type: "F" },
        { q: "你更偏好按部就班地完成任务，而不是同时处理多个突发情况。", type: "J" },
        { q: "你被视为一个脑洞极大的人，脑海中总是有跳跃的创意。", type: "N" }
    ];

    let step = 0;
    let sc = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    function start() {
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        update();
    }

    function update() {
        document.getElementById('q-text').innerText = questions[step].q;
        document.getElementById('p-bar').style.width = `${((step+1)/questions.length)*100}%`;
    }

    function next(v) {
        const q = questions[step];
        const opp = {E:'I', I:'E', S:'N', N:'S', T:'F', F:'T', J:'P', P:'J'};
        if(v > 0) sc[q.type] += v;
        else if(v < 0) sc[opp[q.type]] += Math.abs(v);
        step++;
        if(step < questions.length) update();
        else show();
    }

    function show() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        const m = (sc.E>=sc.I?'E':'I')+(sc.S>=sc.N?'S':'N')+(sc.T>=sc.F?'T':'F')+(sc.J>=sc.P?'J':'P');
        const p = getSafePerson(m);
        
        document.getElementById('res-mbti').innerText = m;
        document.getElementById('res-name').innerText = p.name;
        document.getElementById('res-desc').innerText = p.desc;
        
        // 渲染图标特质
        document.getElementById('res-traits').innerHTML = p.traits.map(t => `
            <div class="trait-item">
                <i class="fa-solid ${t.icon}"></i>
                <span>${t.text}</span>
            </div>
        `).join('');

        // 绘图
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['感性', '理性', '创造', '逻辑', '影响', '稳定'],
                datasets: [{ 
                    data: p.stats, 
                    backgroundColor: 'rgba(108, 92, 231, 0.1)', borderColor: '#6c5ce7', 
                    borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#6c5ce7' 
                }]
            },
            options: { 
                scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: '#f0f0f5' } } },
                plugins: { legend: { display: false } }
            }
        });
    }
</script>
</body>
</html>
